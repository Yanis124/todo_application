name: Todo App CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('devops/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r devops/requirements.txt

      - name: Lint with flake8 (optional)
        run: |
          pip install flake8
          flake8 src/backend/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
        continue-on-error: true

      - name: Run backend tests with coverage
        run: |
          cd src/backend
          python -m pytest ../../tests/backend/ -v --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing
        env:
          SECRET_KEY: test-secret-key
          DATABASE_URL: sqlite:///./test.db
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          ALGORITHM: HS256

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: src/backend/htmlcov/

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd src/frontend
          npm install

      - name: Build frontend (Vite)
        run: |
          cd src/frontend
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: src/frontend/dist/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker build -f devops/Dockerfile.backend -t todo-backend:test .

      - name: Build frontend image
        run: |
          docker build -f devops/Dockerfile.frontend -t todo-frontend:test .

      - name: Test Docker Compose
        run: |
          cd devops
          docker compose up -d
          sleep 10
          curl -f http://localhost:8000/health || echo 'Backend health check warning'
          docker compose down
